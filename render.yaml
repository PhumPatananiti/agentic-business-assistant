services:
  - type: web
    name: agentic-business-agent
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_PORT
        value: 5678
      - key: N8N_PROTOCOL
        value: https
      - key: GENERIC_TIMEZONE
        value: Asia/Bangkok
      - key: N8N_SECURE_COOKIE
        value: "false"
      - key: N8N_USER_FOLDER
        value: /home/node/.n8n
      # API keys — set these in the Render dashboard after first deploy
      - key: GEMINI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false